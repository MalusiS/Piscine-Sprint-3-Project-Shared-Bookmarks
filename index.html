<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WCAG AA-compliant bookmark manager built with vanilla JS, TDD, and LocalStorage persistence.">
  <title>Shared Bookmarks • Malusi Skunyana</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      content: ["*"],
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    .bookmark-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .bookmark-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen transition-colors">

  <div class="max-w-7xl mx-auto">
    <header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 sticky top-0 z-50">
      <div class="px-4 sm:px-6 py-4 sm:py-5 flex items-center justify-between">
        
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 sm:w-10 sm:h-10 bg-violet-600 rounded-2xl flex items-center justify-center text-white font-bold text-xl sm:text-2xl shrink-0" aria-hidden="true">📚</div>
          <div>
            <h1 class="text-lg sm:text-2xl font-bold tracking-tight leading-tight">Shared Bookmarks</h1>
            <p class="text-[10px] sm:text-xs text-gray-500 dark:text-gray-400 mt-0 sm:-mt-1">by Malusi Skunyana</p>
          </div>
        </div>

        <div class="flex items-center gap-2 sm:gap-4 shrink-0">
          
          <button id="theme-toggle"
            aria-label="Toggle dark mode"
            class="w-10 h-10 sm:w-11 sm:h-11 flex items-center justify-center rounded-2xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-violet-500">
            <i class="fa-solid fa-moon text-lg sm:text-xl" aria-hidden="true"></i>
          </button>
          
          <a href="https://github.com/MalusiS/Piscine-Sprint-3-Project-Shared-Bookmarks" 
             target="_blank"
             rel="noopener noreferrer"
             aria-label="View Source on GitHub"
             class="flex items-center justify-center gap-2 w-10 h-10 sm:w-auto sm:h-auto sm:px-5 sm:py-3 bg-gray-900 dark:bg-white text-white dark:text-gray-900 rounded-2xl font-medium hover:scale-105 transition-transform focus:outline-none focus-visible:ring-2 focus-visible:ring-violet-500 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-gray-900">
            <i class="fa-brands fa-github text-lg sm:text-base" aria-hidden="true"></i>
            <span class="hidden sm:inline">View Source</span>
          </a>
          
        </div>
      </div>
    </header>

    <main class="flex flex-col lg:flex-row gap-8 p-6">
      
      <div class="lg:w-80 bg-white dark:bg-gray-900 rounded-3xl shadow-sm border border-gray-100 dark:border-gray-800 p-6 h-fit">
        <label for="user-select" class="font-semibold text-lg mb-4 flex items-center gap-2 block">
          <i class="fa-solid fa-users" aria-hidden="true"></i>
          Choose User
        </label>
        <select id="user-select" 
          class="w-full bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-2xl px-5 py-4 text-base focus:outline-none focus:ring-2 focus:ring-violet-500">
          </select>
      </div>

      <div class="flex-1 space-y-8">
        
        <div class="flex flex-col sm:flex-row gap-4">
          <div class="relative flex-1">
            <label for="search-input" class="sr-only">Search bookmarks</label>
            <input id="search-input" 
              type="text" 
              placeholder="Search bookmarks..." 
              class="w-full bg-white dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-3xl px-6 py-4 pl-14 focus:outline-none focus:ring-2 focus:ring-violet-500">
            <i class="fa-solid fa-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-gray-400" aria-hidden="true"></i>
          </div>
          <button id="add-btn"
            class="bg-violet-600 hover:bg-violet-700 text-white px-8 rounded-3xl font-semibold flex items-center gap-3 transition-all active:scale-95 focus:outline-none focus-visible:ring-2 focus-visible:ring-violet-500 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-gray-950">
            <i class="fa-solid fa-plus" aria-hidden="true"></i>
            Add Bookmark
          </button>
        </div>

        <section id="bookmarks-section" aria-live="polite">
          <h2 id="bookmarks-section-label" class="font-semibold text-xl mb-6 flex items-center justify-between">
            <span>User Bookmarks</span>
            <span id="bookmark-count" class="text-sm font-normal text-gray-500 dark:text-gray-400">0 bookmarks</span>
          </h2>

          <div id="bookmarks-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

          <div id="empty-state" class="hidden text-center py-20">
            <div class="mx-auto w-24 h-24 bg-gray-100 dark:bg-gray-800 rounded-3xl flex items-center justify-center text-5xl mb-6" aria-hidden="true">📭</div>
            <h3 class="text-2xl font-medium mb-2">No bookmarks yet</h3>
            <p class="text-gray-500 max-w-sm mx-auto">Add your first bookmark using the form above. Everything is saved locally in your browser.</p>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div id="modal" 
       class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-[100]" 
       role="dialog" 
       aria-modal="true" 
       aria-labelledby="modal-title">
    <div class="bg-white dark:bg-gray-900 rounded-3xl max-w-lg w-full mx-4 shadow-2xl">
      <div class="p-8">
        <h2 id="modal-title" class="text-2xl font-bold mb-6">Add New Bookmark</h2>
        
        <form id="bookmark-form">
          <div class="space-y-6">
            <div>
              <label for="bookmark-url" class="block text-sm font-medium mb-2">URL</label>
              <input id="bookmark-url" type="url" required 
                class="w-full rounded-2xl border border-gray-300 dark:border-gray-700 px-5 py-4 focus:outline-none focus:ring-2 focus:ring-violet-500"
                placeholder="https://example.com">
            </div>
            <div>
              <label for="bookmark-title" class="block text-sm font-medium mb-2">Title</label>
              <input id="bookmark-title" type="text" required 
                class="w-full rounded-2xl border border-gray-300 dark:border-gray-700 px-5 py-4 focus:outline-none focus:ring-2 focus:ring-violet-500">
            </div>
            <div>
              <label for="bookmark-description" class="block text-sm font-medium mb-2">Description</label>
              <textarea id="bookmark-description" rows="4" required
                class="w-full rounded-2xl border border-gray-300 dark:border-gray-700 px-5 py-4 focus:outline-none focus:ring-2 focus:ring-violet-500"></textarea>
            </div>
          </div>

          <div class="flex gap-4 mt-10">
            <button type="button" id="cancel-btn"
              class="flex-1 py-4 rounded-2xl font-medium border border-gray-300 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800 focus:outline-none focus-visible:ring-2 focus-visible:ring-violet-500">Cancel</button>
            <button type="submit"
              class="flex-1 py-4 bg-violet-600 hover:bg-violet-700 text-white rounded-2xl font-semibold focus:outline-none focus-visible:ring-2 focus-visible:ring-violet-500 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-gray-900">Add Bookmark</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="./script.js"></script>
</body>
</html>
